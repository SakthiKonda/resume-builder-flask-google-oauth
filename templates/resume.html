<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Resume – SkillVault</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header>Create Resume</header>
    <div class="container">
        <form method="POST">
            <label>Name</label>
            <input type="text" name="name" value="{{ data.name if data else '' }}" required>

            <label>Professional Title</label>
            <input type="text" name="title" value="{{ data.title if data else '' }}">

            <label>Summary</label>
            <textarea name="summary">{{ data.summary if data else '' }}</textarea>

            <label>Skills (comma-separated)</label>
            <input type="text" name="skills" value="{{ data.skills if data else '' }}">

            <label>Experience</label>
            <textarea name="experience">{{ data.experience if data else '' }}</textarea>

            <label>Projects</label>
            <textarea name="projects">{{ data.projects if data else '' }}</textarea>

            <label>Education</label>
            <textarea name="education">{{ data.education if data else '' }}</textarea>

            <label>Certifications</label>
            <input type="text" name="certifications" value="{{ data.certifications if data else '' }}">

            <label>GitHub Link</label>
            <input type="text" name="github" value="{{ data.github if data else '' }}">

            <label>LinkedIn Link</label>
            <input type="text" name="linkedin" value="{{ data.linkedin if data else '' }}">

            <label>Target Job Role</label>
            <select name="job_role" required>
                <option value="">-- Select a Role --</option>
                {% for role in roles %}
                    <option value="{{ role }}" {% if data and data.job_role == role %}selected{% endif %}>{{ role }}</option>
                {% endfor %}
            </select>

            <input type="submit" value="Save & Continue →">
        </form>
    </div>
</body>
</html>
